     <!DOCTYPE html>

<head>
<meta charset="utf-8">
<title>Wasilewska Z40_JS</title>
</head>
<body>
<div style="color:red;font-size:50px;">
<script>
var x=prompt("podaj argument x=","");
var x_was=parseFloat(x);
document.write("wykonała Kasia Wasilewska<br>");
document.write("czytany argument x="+x_was.toFixed(2)+"<br>");
function f_was(x_was)
{
if(x_was>=1) {return 1;}
else if(x_was>=-2 && x_was<1) {return x_was*x_was;}
else if(x_was<-2) {return 4;}
}

document.write("f("+x_was.toFixed(2)+")="+f_was(x_was).toFixed(2));

</script>
</div>
