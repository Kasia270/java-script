<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title>Wasilewska Z41_JS</title>
<style>
h1 { text-transform: uppercase; }
</style>
</head>
<body>
<h1>Proste działania</h1> <br>
<h1>Kasia Wasilewska</h1>

<label for="a">Podaj pierwszą liczbę:</label>
<input type="number" id="a">
<br><br>

<label for="b">Podaj drugą liczbę:</label>
<input type="number" id="b">
<br><br>

<input type="button" value="DODAWANIE" onclick="suma()">
<input type="button" value="ODEJMOWANIE" onclick="roznica()">
<input type="button" value="MNOŻENIE" onclick="iloczyn()">
<input type="button" value="DZIELENIE" onclick="iloraz()">

<div id="wynik" style="margin-top:20px;"></div>

<script>
function suma()
{
var a=document.getElementById("a").value;
var b=document.getElementById("b").value;

if(a=="" || b=="")
{
document.getElementById("wynik").innerHTML="Proszę uzupełnić obie liczby.";
}
else
{
a=parseFloat(a);
b=parseFloat(b);
var s=a+b;
document.getElementById("wynik").innerHTML="Wynik działania wynosi: "+s.toFixed(2);
}
}

function roznica()
{
var a=document.getElementById("a").value;
var b=document.getElementById("b").value;

if(a=="" || b=="")
{
document.getElementById("wynik").innerHTML="Proszę uzupełnić obie liczby.";
}
else
{
a=parseFloat(a);
b=parseFloat(b);
var r=a-b;
document.getElementById("wynik").innerHTML="Wynik działania wynosi: "+r.toFixed(2);
}
}

function iloczyn()
{
var a=document.getElementById("a").value;
var b=document.getElementById("b").value;

if(a=="" || b=="")
{
document.getElementById("wynik").innerHTML="Proszę uzupełnić obie liczby.";
}
else
{
a=parseFloat(a);
b=parseFloat(b);
var i=a*b;
document.getElementById("wynik").innerHTML="Wynik działania wynosi: "+i.toFixed(2);
}
}

function iloraz()
{
var a=document.getElementById("a").value;
var b=document.getElementById("b").value;

if(a=="" || b=="")
{
document.getElementById("wynik").innerHTML="Proszę uzupełnić obie liczby.";
}
else
{
a=parseFloat(a);
b=parseFloat(b);

if(b==0)
{
document.getElementById("wynik").innerHTML="Nie wolno dzielić przez zero.";
}
else
{
var d=a/b;
document.getElementById("wynik").innerHTML="Wynik działania wynosi: "+d.toFixed(2);
}
}
}
</script>
</body>
</html>
